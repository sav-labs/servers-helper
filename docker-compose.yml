services:
  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      # Mounted to a staging path; entrypoint.sh copies it with correct permissions
      - ~/.ssh:/root/.ssh-ro:ro
      # Mount config.yaml so you can edit servers/model without rebuilding the image
      # After changes: docker compose restart bot
      - ./bot/config.yaml:/app/config.yaml:ro
    extra_hosts:
      # Resolves host.docker.internal → Docker host machine (used for servers-helper SSH)
      - "host.docker.internal:host-gateway"
